<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتقلنا إلى النسخة الجديدة | Jourly</title>
    <style>
        /* CSS Styles */
        :root {
            --primary-color: #4f46e5; /* لون عصري يناسب تطبيقات التدوين والإنتاجية */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f3f4f6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        h1 {
            color: var(--text-dark);
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .link-highlight {
            background: #f9fafb;
            border: 2px dashed #dee2e6;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .link-highlight code {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
            direction: ltr;
            display: inline-block;
        }

        .btn {
            display: block;
            background: var(--primary-color);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
        }

        .btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.5);
        }

        /* Animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Friendly */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">✨</div>
        <h1>أهلاً وسهلاً بك/ي</h1>
        <p>
            لقد انتقل مشروعنا إلى محطة جديدة! قمنا بتطوير النسخة القديمة كلياً وتغيير التصميم لتجربة أفضل تحت اسم <strong>Jourly</strong>.
        </p>
        
        <div class="link-highlight">
            <p style="margin-bottom: 5px; font-size: 14px;">الرابط الجديد:</p>
            <code>Jourly26.vercel.app</code>
        </div>

        <a href="https://Jourly26.vercel.app" class="btn">انتقل إلى التطبيق الجديد</a>
    </div>

    <script>
        // تفاعل بسيط: طباعة رسالة ترحيب في الكونسول
        console.log("Redirecting to Jourly26...");
        
        // اختيار اختياري: يمكنك جعل الزر يفتح في صفحة جديدة أو نفس الصفحة
        document.querySelector('.btn').addEventListener('click', function(e) {
            console.log("Navigating to the new version...");
        });
    </script>
</body>
</html>
